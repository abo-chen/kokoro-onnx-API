name: kokoro-onnx

services:
  kokoro-onnx:
    build:
      context: .
      args:
        BASE_IMAGE: nvidia/cuda:12.8.1-cudnn-runtime-ubuntu24.04
        TARGET: gpu
    container_name: kokoro-onnx
    ports:
      - "5023:5023"
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
